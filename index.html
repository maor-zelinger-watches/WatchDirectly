<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchDirectly — Watch Content, No Algorithm</title>
  <meta name="description" content="Chronological feed of the best watch YouTube content from 19 curated creators. No algorithm, just the latest videos and community discussion.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="WatchDirectly">
  <meta property="og:description" content="Watch content in chronological order. No algorithm. Community first.">
  <meta property="og:type" content="website">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header" id="header">
    <div class="header__inner">
      <div class="header__logo">
        <span class="header__logo-icon">⌚</span>
        <h1 class="header__title">WatchDirectly</h1>
      </div>
      <div class="header__auth" id="auth-container">
        <!-- Google Sign-In button or user avatar renders here -->
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main" id="main">

    <!-- Feed View -->
    <section class="feed-view" id="feed-view">

      <!-- Feed Cards Container -->
      <div class="feed" id="feed-container">
        <!-- Video cards with inline comments rendered here by JS -->
      </div>

      <!-- Loading Skeleton -->
      <div class="feed-skeleton" id="feed-skeleton" style="display: none;">
        <div class="skeleton-card"><div class="skeleton-embed"></div><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-embed"></div><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-embed"></div><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div>
      </div>

      <!-- Load More -->
      <div class="feed__load-more" id="load-more-container" style="display: none;">
        <button class="btn btn--primary" id="load-more-btn">Load More</button>
      </div>

      <!-- Empty State -->
      <div class="feed__empty" id="feed-empty" style="display: none;">
        <p>No videos yet. Check back soon!</p>
      </div>
    </section>

  </main>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===== SCRIPTS ===== -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
