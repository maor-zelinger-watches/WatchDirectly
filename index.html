<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchDirectly — Watch Content, No Algorithm</title>
  <meta name="description" content="Chronological feed of the best watch YouTube content from 18 curated creators. No algorithm, just the latest videos and community discussion.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="WatchDirectly">
  <meta property="og:description" content="Watch content in chronological order. No algorithm. Community first.">
  <meta property="og:type" content="website">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header" id="header">
    <div class="header__inner">
      <button class="header__back-btn" id="back-btn" aria-label="Back to feed" style="display: none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="header__logo">
        <span class="header__logo-icon">⌚</span>
        <h1 class="header__title">WatchDirectly</h1>
      </div>
      <div class="header__auth" id="auth-container">
        <!-- Google Sign-In button or user avatar renders here -->
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main" id="main">

    <!-- Feed View -->
    <section class="feed-view" id="feed-view">
      <!-- Filter Tabs -->
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tabs__btn filter-tabs__btn--active" data-filter="all">All</button>
        <button class="filter-tabs__btn" data-filter="0">⭐ Tier 0</button>
        <button class="filter-tabs__btn" data-filter="1">Tier 1</button>
        <button class="filter-tabs__btn" data-filter="2">Tier 2</button>
        <button class="filter-tabs__btn" data-filter="3">Tier 3</button>
      </div>

      <!-- Feed Cards Container -->
      <div class="feed" id="feed-container">
        <!-- Video cards rendered here by JS -->
      </div>

      <!-- Loading Skeleton -->
      <div class="feed-skeleton" id="feed-skeleton" style="display: none;">
        <div class="skeleton-card"><div class="skeleton-embed"></div><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-embed"></div><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-embed"></div><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div></div>
      </div>

      <!-- Load More -->
      <div class="feed__load-more" id="load-more-container" style="display: none;">
        <button class="btn btn--primary" id="load-more-btn">Load More</button>
      </div>

      <!-- Empty State -->
      <div class="feed__empty" id="feed-empty" style="display: none;">
        <p>No videos yet. Check back soon!</p>
      </div>
    </section>

    <!-- Post Detail View -->
    <section class="detail-view" id="detail-view" style="display: none;">
      <!-- Video embed + info -->
      <div class="detail-view__video" id="detail-video">
        <!-- Rendered by JS -->
      </div>

      <!-- Comment Section -->
      <div class="detail-view__comments">
        <h2 class="comments-header" id="comments-header">💬 Comments</h2>

        <!-- Comment Input -->
        <div class="comment-input" id="comment-input-container">
          <div class="comment-input__auth-prompt" id="comment-auth-prompt">
            <p>Sign in with Google to join the discussion</p>
          </div>
          <form class="comment-input__form" id="comment-form" style="display: none;">
            <div class="comment-input__user" id="comment-user-info">
              <!-- User avatar + name rendered here -->
            </div>
            <textarea
              class="comment-input__textarea"
              id="comment-textarea"
              placeholder="What do you think?"
              maxlength="2000"
              rows="3"
            ></textarea>
            <div class="comment-input__footer">
              <span class="comment-input__charcount" id="comment-charcount">0/2000</span>
              <button type="submit" class="btn btn--primary btn--sm" id="comment-submit-btn">Comment</button>
            </div>
          </form>
        </div>

        <!-- Comments List -->
        <div class="comments-list" id="comments-list">
          <!-- Comment threads rendered here by JS -->
        </div>

        <!-- Comments Loading -->
        <div class="comments-loading" id="comments-loading" style="display: none;">
          <div class="spinner"></div>
          <p>Loading comments...</p>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===== SCRIPTS ===== -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
