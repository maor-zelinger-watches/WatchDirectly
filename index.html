<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Security headers (GitHub Pages can't set real HTTP headers, so these ship
       as meta). CSP is defense-in-depth for the app's innerHTML rendering: even
       if an escape were ever missed, script-src has no 'unsafe-inline' and no
       wildcard host, so an injected inline/remote <script> won't run — which is
       what protects the session token in localStorage. Allowed origins: Google
       Sign-In (accounts.google.com), YouTube embeds (youtube-nocookie), the
       Apps Script backend (script.google[usercontent].com), and Google Fonts.
       img-src stays broad (https:) because article/preview images and avatars
       come from arbitrary hosts — images are inert. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://accounts.google.com https://www.youtube-nocookie.com https://www.youtube.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com https://oauth2.googleapis.com">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>WatchDirectly — Watch Content, No Algorithm</title>
  <meta name="description" content="Chronological feed of the best watch YouTube content from 19 curated creators. No algorithm, just the latest videos and community discussion.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="WatchDirectly">
  <meta property="og:description" content="Watch content in chronological order. No algorithm. Community first.">
  <meta property="og:type" content="website">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header" id="header">
    <div class="header__inner">
      <div class="header__logo">
        <span class="header__logo-icon">⌚</span>
        <h1 class="header__title">WatchDirectly</h1>
      </div>
      <div class="header__auth" id="auth-container">
        <!-- Google Sign-In button or user avatar renders here -->
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main" id="main">

    <!-- Feed View -->
    <section class="feed-view" id="feed-view">

      <!-- View Tabs: Latest / Top This Week / Favorites / Channels -->
      <div class="feed-tabs" id="feed-tabs" role="tablist" aria-label="Feed view">
        <button class="feed-tab feed-tab--active" data-view="latest" role="tab" aria-selected="true">Latest</button>
        <button class="feed-tab" data-view="top" role="tab" aria-selected="false">Top This Week</button>
        <button class="feed-tab" data-view="starred" role="tab" aria-selected="false">Favorites</button>
        <button class="feed-tab" data-view="channels" role="tab" aria-selected="false">Channels</button>
      </div>

      <!-- Search & Category Filters -->
      <div class="feed-controls" id="feed-controls">
        <input
          type="search"
          class="feed-controls__search"
          id="search-input"
          placeholder="Search videos or channels…"
          autocomplete="off"
          aria-label="Search videos or channels"
        >
        <div class="feed-controls__chips" id="category-chips" role="group" aria-label="Filter by category"></div>
      </div>

      <!-- Feed Cards Container -->
      <div class="feed" id="feed-container">
        <!-- Video cards with inline comments rendered here by JS -->
      </div>

      <!-- Loading Skeleton: six tiles fill ~two rows of the desktop grid -->
      <div class="feed-skeleton" id="feed-skeleton" style="display: none;">
        <div class="skeleton-card"><div class="skeleton-card__grid"><div class="skeleton-embed"></div><div class="skeleton-content"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div><div class="skeleton-line skeleton-line--actions"></div></div></div></div>
        <div class="skeleton-card"><div class="skeleton-card__grid"><div class="skeleton-embed"></div><div class="skeleton-content"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div><div class="skeleton-line skeleton-line--actions"></div></div></div></div>
        <div class="skeleton-card"><div class="skeleton-card__grid"><div class="skeleton-embed"></div><div class="skeleton-content"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div><div class="skeleton-line skeleton-line--actions"></div></div></div></div>
        <div class="skeleton-card"><div class="skeleton-card__grid"><div class="skeleton-embed"></div><div class="skeleton-content"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div><div class="skeleton-line skeleton-line--actions"></div></div></div></div>
        <div class="skeleton-card"><div class="skeleton-card__grid"><div class="skeleton-embed"></div><div class="skeleton-content"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div><div class="skeleton-line skeleton-line--actions"></div></div></div></div>
        <div class="skeleton-card"><div class="skeleton-card__grid"><div class="skeleton-embed"></div><div class="skeleton-content"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--meta"></div><div class="skeleton-line skeleton-line--actions"></div></div></div></div>
      </div>

      <!-- Infinite Scroll Sentinel -->
      <div class="feed__load-more" id="load-more-container" style="display: none;">
        <div class="spinner"></div>
      </div>

      <!-- Search Loading State -->
      <div class="feed__searching" id="feed-searching" style="display: none;" role="status" aria-live="polite">
        <div class="spinner"></div>
        <p>Searching…</p>
      </div>

      <!-- Empty State -->
      <div class="feed__empty" id="feed-empty" style="display: none;">
        <p>No videos yet. Check back soon!</p>
      </div>
    </section>

  </main>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" id="footer">
    <div class="footer__inner">
      <nav class="footer__nav" id="footer-nav">
        <a href="./terms.html" class="footer__nav-link">Terms</a>
        <a href="./privacy.html" class="footer__nav-link">Privacy</a>
      </nav>
      <div class="footer__meta">
        <span class="footer__copyright">© <span id="footer-year">2026</span> WatchDirectly</span>
        <span class="footer__version" id="app-version" title="Frontend version"></span>
      </div>
    </div>
  </footer>
  <script src="js/footer-year.js"></script>

  <!-- ===== SCRIPTS ===== -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
